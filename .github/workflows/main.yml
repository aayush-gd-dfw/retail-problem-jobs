name: Retail Problem Incomplete Jobs -> SharePoint

on:
  schedule:
    # GitHub Actions cron is UTC (no timezone support).
    # Dallas (America/Chicago) on Feb 25, 2026 = CST (UTC-6)
    # 9a,11a,1p,3p,5p,7p,9p CST -> 15,17,19,21,23,1,3 UTC
    - cron: "0 15-23/2 * * *"  # 15,17,19,21,23 UTC
    - cron: "0 1-3/2 * * *"    # 1,3 UTC
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          python "Incomplete Jobs.py"
